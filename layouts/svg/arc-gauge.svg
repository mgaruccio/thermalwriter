<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0c18"/>
      <stop offset="100%" stop-color="#060610"/>
    </linearGradient>
    <linearGradient id="cpuArc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4d6a"/>
      <stop offset="100%" stop-color="#ff8a5c"/>
    </linearGradient>
    <linearGradient id="gpuArc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4dc9f6"/>
      <stop offset="100%" stop-color="#9b59ff"/>
    </linearGradient>
    <linearGradient id="fpsGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f5c8"/>
      <stop offset="100%" stop-color="#00c896"/>
    </linearGradient>
    <!-- Glow filters -->
    <filter id="cpuGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="gpuGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="480" fill="url(#bgGrad)"/>

  <!-- === CPU Gauge (left) === -->
  <g transform="translate(140, 160)">
    <!-- Track -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#1a1a2e" stroke-width="14"
            stroke-dasharray="471 157" stroke-dashoffset="-78" stroke-linecap="round"/>
    <!-- Arc fill — 270° sweep, driven by cpu_util -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#cpuArc)" stroke-width="14"
            stroke-dasharray="{{ cpu_util | default(value='0') | float * 4.71 | round(precision=0) }} 628"
            stroke-dashoffset="-78" stroke-linecap="round" filter="url(#cpuGlow)"/>
    <!-- Labels -->
    <text x="0" y="-18" font-family="DejaVu Sans Mono, monospace" font-size="42" fill="#ffffff"
          text-anchor="middle" font-weight="bold">{{ cpu_temp | default(value="--") }}°</text>
    <text x="0" y="14" font-family="DejaVu Sans Mono, monospace" font-size="18" fill="#ff6b80"
          text-anchor="middle">{{ cpu_util | default(value="--") }}%</text>
    <text x="0" y="40" font-family="DejaVu Sans Mono, monospace" font-size="12" fill="#666680"
          text-anchor="middle">CPU</text>
  </g>

  <!-- === GPU Gauge (right) === -->
  <g transform="translate(340, 160)">
    <!-- Track -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#1a1a2e" stroke-width="14"
            stroke-dasharray="471 157" stroke-dashoffset="-78" stroke-linecap="round"/>
    <!-- Arc fill -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#gpuArc)" stroke-width="14"
            stroke-dasharray="{{ gpu_util | default(value='0') | float * 4.71 | round(precision=0) }} 628"
            stroke-dashoffset="-78" stroke-linecap="round" filter="url(#gpuGlow)"/>
    <!-- Labels -->
    <text x="0" y="-18" font-family="DejaVu Sans Mono, monospace" font-size="42" fill="#ffffff"
          text-anchor="middle" font-weight="bold">{{ gpu_temp | default(value="--") }}°</text>
    <text x="0" y="14" font-family="DejaVu Sans Mono, monospace" font-size="18" fill="#7eb8ff"
          text-anchor="middle">{{ gpu_util | default(value="--") }}%</text>
    <text x="0" y="40" font-family="DejaVu Sans Mono, monospace" font-size="12" fill="#666680"
          text-anchor="middle">GPU</text>
  </g>

  <!-- === GPU Power (center bottom) === -->
  <text x="240" y="300" font-family="DejaVu Sans Mono, monospace" font-size="20" fill="#b08aff"
        text-anchor="middle">{{ gpu_power | default(value="--") }}W</text>

  <!-- === Bottom Stats Bar === -->
  <rect x="24" y="340" width="432" height="2" rx="1" fill="#1a1a2e"/>

  <!-- FPS -->
  <text x="240" y="395" font-family="DejaVu Sans Mono, monospace" font-size="56" fill="url(#fpsGrad)"
        text-anchor="middle" font-weight="bold">{{ fps | default(value="--") }}</text>
  <text x="240" y="420" font-family="DejaVu Sans Mono, monospace" font-size="13" fill="#666680"
        text-anchor="middle">FPS</text>
  <text x="240" y="442" font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#558877"
        text-anchor="middle">{{ frametime | default(value="--") }}ms</text>

  <!-- RAM -->
  <text x="72" y="390" font-family="DejaVu Sans Mono, monospace" font-size="20" fill="#cc9eff"
        text-anchor="middle" font-weight="bold">{{ ram_used | default(value="--") }}G</text>
  <text x="72" y="412" font-family="DejaVu Sans Mono, monospace" font-size="10" fill="#666680"
        text-anchor="middle">RAM</text>

  <!-- VRAM -->
  <text x="408" y="390" font-family="DejaVu Sans Mono, monospace" font-size="20" fill="#cc9eff"
        text-anchor="middle" font-weight="bold">{{ vram_used | default(value="--") }}G</text>
  <text x="408" y="412" font-family="DejaVu Sans Mono, monospace" font-size="10" fill="#666680"
        text-anchor="middle">VRAM</text>
</svg>
