<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <linearGradient id="bgG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <linearGradient id="hotGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3366"/>
      <stop offset="100%" stop-color="#ff6633"/>
    </linearGradient>
    <linearGradient id="coldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#33ccff"/>
      <stop offset="100%" stop-color="#6633ff"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ffaa"/>
      <stop offset="100%" stop-color="#00cc88"/>
    </linearGradient>
    <linearGradient id="barBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#161628"/>
      <stop offset="100%" stop-color="#1a1a30"/>
    </linearGradient>
    <clipPath id="cpuBar">
      <rect x="32" y="140" width="{{ cpu_util | default(value='0') | float * 4.16 | round(precision=0) }}" height="18" rx="4"/>
    </clipPath>
    <clipPath id="gpuBar">
      <rect x="32" y="310" width="{{ gpu_util | default(value='0') | float * 4.16 | round(precision=0) }}" height="18" rx="4"/>
    </clipPath>
    <!-- Subtle scan-line pattern -->
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="480" height="4">
      <rect width="480" height="2" fill="transparent"/>
      <rect y="2" width="480" height="2" fill="#000000" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="480" height="480" fill="url(#bgG)"/>
  <rect width="480" height="480" fill="url(#scanlines)"/>

  <!-- Decorative grid lines -->
  <line x1="240" y1="0" x2="240" y2="480" stroke="#111122" stroke-width="1"/>
  <line x1="0" y1="170" x2="480" y2="170" stroke="#111122" stroke-width="1"/>
  <line x1="0" y1="340" x2="480" y2="340" stroke="#111122" stroke-width="1"/>

  <!-- ===== CPU Section ===== -->
  <text x="32" y="40" font-family="DejaVu Sans Mono, monospace" font-size="12" fill="#ff5577" letter-spacing="4">CPU</text>
  <line x1="32" y1="50" x2="200" y2="50" stroke="#ff336644" stroke-width="1"/>

  <!-- CPU Temp — large hero number -->
  <text x="32" y="116" font-family="DejaVu Sans Mono, monospace" font-size="72" fill="url(#hotGrad)" font-weight="bold">{{ cpu_temp | default(value="--") }}°</text>
  <text x="320" y="100" font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#666680" text-anchor="end">TEMP</text>

  <!-- CPU Utilization bar -->
  <rect x="32" y="140" width="416" height="18" rx="4" fill="url(#barBg)"/>
  <rect x="32" y="140" width="416" height="18" rx="4" fill="url(#hotGrad)" clip-path="url(#cpuBar)" opacity="0.8"/>
  <text x="448" y="155" font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#ff8899" text-anchor="end">{{ cpu_util | default(value="--") }}%</text>

  <!-- ===== GPU Section ===== -->
  <text x="32" y="210" font-family="DejaVu Sans Mono, monospace" font-size="12" fill="#55aaff" letter-spacing="4">GPU</text>
  <line x1="32" y1="220" x2="200" y2="220" stroke="#3366ff44" stroke-width="1"/>

  <!-- GPU Temp — large hero number -->
  <text x="32" y="286" font-family="DejaVu Sans Mono, monospace" font-size="72" fill="url(#coldGrad)" font-weight="bold">{{ gpu_temp | default(value="--") }}°</text>
  <text x="320" y="270" font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#666680" text-anchor="end">TEMP</text>
  <text x="448" y="270" font-family="DejaVu Sans Mono, monospace" font-size="18" fill="#9966cc" text-anchor="end">{{ gpu_power | default(value="--") }}W</text>

  <!-- GPU Utilization bar -->
  <rect x="32" y="310" width="416" height="18" rx="4" fill="url(#barBg)"/>
  <rect x="32" y="310" width="416" height="18" rx="4" fill="url(#coldGrad)" clip-path="url(#gpuBar)" opacity="0.8"/>
  <text x="448" y="325" font-family="DejaVu Sans Mono, monospace" font-size="14" fill="#77bbff" text-anchor="end">{{ gpu_util | default(value="--") }}%</text>

  <!-- ===== Bottom Stats ===== -->
  <!-- FPS — center hero -->
  <text x="240" y="415" font-family="DejaVu Sans Mono, monospace" font-size="52" fill="url(#greenGrad)"
        text-anchor="middle" font-weight="bold">{{ fps | default(value="--") }}</text>
  <text x="240" y="438" font-family="DejaVu Sans Mono, monospace" font-size="11" fill="#448866"
        text-anchor="middle">{{ frametime | default(value="--") }}ms</text>

  <!-- RAM — left -->
  <text x="56" y="400" font-family="DejaVu Sans Mono, monospace" font-size="20" fill="#cc99ff"
        text-anchor="middle">{{ ram_used | default(value="--") }}G</text>
  <text x="56" y="418" font-family="DejaVu Sans Mono, monospace" font-size="9" fill="#666680"
        text-anchor="middle">RAM / {{ ram_total | default(value="--") }}G</text>

  <!-- VRAM — right -->
  <text x="424" y="400" font-family="DejaVu Sans Mono, monospace" font-size="20" fill="#cc99ff"
        text-anchor="middle">{{ vram_used | default(value="--") }}G</text>
  <text x="424" y="418" font-family="DejaVu Sans Mono, monospace" font-size="9" fill="#666680"
        text-anchor="middle">VRAM / {{ vram_total | default(value="--") }}G</text>

  <!-- Corner accents -->
  <path d="M 0 20 L 0 0 L 20 0" stroke="#ff336644" fill="none" stroke-width="2"/>
  <path d="M 460 0 L 480 0 L 480 20" stroke="#3366ff44" fill="none" stroke-width="2"/>
  <path d="M 0 460 L 0 480 L 20 480" stroke="#ff336644" fill="none" stroke-width="2"/>
  <path d="M 460 480 L 480 480 L 480 460" stroke="#3366ff44" fill="none" stroke-width="2"/>
</svg>
